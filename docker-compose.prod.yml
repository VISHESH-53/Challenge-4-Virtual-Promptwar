version: '3.8'

services:
  frontend:
    build:
      target: production
    volumes: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  backend:
    build:
      target: production
    volumes: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  nginx:
    restart: always
